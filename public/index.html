<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>SafeRoute SF</title>
    <meta
      name="description"
      content="Live safer walking navigation for San Francisco with location tracking, route guidance, AI chat, and incident reporting."
    />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="SafeRoute SF" />
    <meta
      property="og:description"
      content="Live safer walking navigation for San Francisco with location tracking, route guidance, AI chat, and incident reporting."
    />
    <meta property="og:url" content="__APP_URL__" />
    <meta property="og:image" content="__SHARE_IMAGE_URL__" />
    <meta property="og:image:alt" content="SafeRoute SF logo" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SafeRoute SF" />
    <meta
      name="twitter:description"
      content="Live safer walking navigation for San Francisco with location tracking, route guidance, AI chat, and incident reporting."
    />
    <meta name="twitter:image" content="__SHARE_IMAGE_URL__" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="/styles.css?v=20260316-ui-refresh1" />
  </head>
  <body>
    <div id="appShell" class="app-shell">
      <div id="map"></div>
      <div id="statusText" class="sr-only" aria-live="polite">Live city guidance</div>
      <button id="sheetBackdrop" class="sheet-backdrop hidden" type="button" aria-label="Close panel"></button>

      <header id="navTopHud" class="top-hud hidden">
        <div class="hud-actions hud-actions-top">
          <button id="navReportButton" class="top-action-button nav-report-button" type="button" aria-label="Report an incident">
            <svg class="top-action-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 4 21 20H3L12 4Z"></path>
              <path d="M12 9v5"></path>
              <circle cx="12" cy="17" r="1"></circle>
            </svg>
            <span class="nav-report-label">Report</span>
            <span class="sr-only">Report</span>
          </button>
        </div>
      </header>

      <section id="navCard" class="nav-card hidden">
        <button id="navSheetHandle" class="sheet-handle nav-sheet-handle" type="button" aria-label="Expand route details">
          <span class="sheet-handle-bar"></span>
        </button>
        <div class="nav-top">
          <div>
            <span id="routeModeLabel" class="nav-label">Safer route</span>
            <strong id="etaRemaining">-- min left</strong>
          </div>
          <button id="stopRouteButton" class="ghost-button" type="button">End</button>
        </div>
        <div class="nav-metrics">
          <span id="distanceRemaining">-- km left</span>
          <span id="riskSummary">Risk --</span>
        </div>
        <div class="route-progress-shell" aria-hidden="true">
          <div class="route-progress-track">
            <div id="routeProgressFill" class="route-progress-fill"></div>
          </div>
          <span id="routeProgressLabel" class="route-progress-label">0% completed</span>
        </div>
        <p id="nextInstruction" class="nav-instruction">Choose a destination to start.</p>
        <div class="nav-actions">
          <button id="saferRouteButton" class="segment-button active" type="button">Safer</button>
          <button id="fastestRouteButton" class="segment-button" type="button">Fastest</button>
        </div>
      </section>

      <section id="bottomSheet" class="bottom-sheet">
        <button id="bottomSheetHandle" class="sheet-handle" type="button" aria-label="Expand route planner">
          <span class="sheet-handle-bar"></span>
        </button>
        <form id="routeForm" class="search-card" autocomplete="off">
          <div class="origin-row">
            <button id="useMyLocationButton" class="pill-button active" type="button">My location</button>
            <button id="originToggleButton" class="pill-button" type="button">Origin</button>
            <button id="settingsButton" class="pill-button" type="button">Settings</button>
          </div>

          <div id="originField" class="field-stack hidden">
            <input id="originInput" name="origin" placeholder="Origin" />
            <div id="originSuggestions" class="suggestions hidden"></div>
          </div>

          <div id="inlineSwapRow" class="inline-swap-row hidden">
            <button id="swapButton" class="inline-swap-button" type="button" aria-label="Swap origin and destination">
              <span aria-hidden="true">↕</span>
            </button>
          </div>

          <div class="field-stack destination-field">
            <input id="destinationInput" name="destination" placeholder="Where to?" required />
            <div id="destinationSuggestions" class="suggestions hidden"></div>
          </div>

          <button id="compareButton" class="primary-button" type="submit">Start</button>
        </form>
      </section>

      <section id="settingsSheet" class="overlay-sheet hidden">
        <div class="sheet-head">
          <strong>Settings</strong>
          <button id="settingsCloseButton" class="ghost-button" type="button">Close</button>
        </div>
        <div class="settings-quick-actions">
          <button id="locateButton" class="settings-inline-button" type="button">My position</button>
        </div>
        <div class="settings-filters">
          <label class="sheet-field">
            <span>Live window</span>
            <div class="custom-select" data-select="hours">
              <select id="hoursSelect" class="sr-only" aria-label="Live window">
                <option value="6">6h</option>
                <option value="12">12h</option>
                <option value="24">24h</option>
                <option value="48" selected>48h</option>
                <option value="72">72h</option>
              </select>
              <button id="hoursSelectButton" class="select-button" type="button" aria-haspopup="listbox" aria-expanded="false">
                <span id="hoursSelectLabel">48h</span>
              </button>
              <div id="hoursSelectMenu" class="select-menu hidden" role="listbox" aria-label="Live window options">
                <button class="select-option" type="button" data-select="hours" data-value="6">6h</button>
                <button class="select-option" type="button" data-select="hours" data-value="12">12h</button>
                <button class="select-option" type="button" data-select="hours" data-value="24">24h</button>
                <button class="select-option" type="button" data-select="hours" data-value="48">48h</button>
                <button class="select-option" type="button" data-select="hours" data-value="72">72h</button>
              </div>
            </div>
          </label>
          <label class="sheet-field">
            <span>Live source</span>
            <div class="custom-select" data-select="source">
              <select id="sourceSelect" class="sr-only" aria-label="Source layer">
                <option value="all" selected>All</option>
                <option value="calls">Calls</option>
                <option value="incidents">Incidents</option>
              </select>
              <button id="sourceSelectButton" class="select-button" type="button" aria-haspopup="listbox" aria-expanded="false">
                <span id="sourceSelectLabel">All</span>
              </button>
              <div id="sourceSelectMenu" class="select-menu hidden" role="listbox" aria-label="Source layer options">
                <button class="select-option" type="button" data-select="source" data-value="all">All</button>
                <button class="select-option" type="button" data-select="source" data-value="calls">Calls</button>
                <button class="select-option" type="button" data-select="source" data-value="incidents">Incidents</button>
              </div>
            </div>
          </label>
          <label class="severity-switch settings-severity-switch" for="violentOnlyInput">
            <span class="severity-copy">
              <strong>Highest severity only</strong>
              <small>Focus on the strongest recent signals</small>
            </span>
            <span class="switch-shell">
              <input type="checkbox" id="violentOnlyInput" class="sr-only" />
              <span class="switch-track"><span class="switch-thumb"></span></span>
            </span>
          </label>
        </div>
        <div class="settings-actions">
          <button id="settingsReportButton" class="sheet-action-button" type="button">
            <svg class="top-action-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 4 21 20H3L12 4Z"></path>
              <path d="M12 9v5"></path>
              <circle cx="12" cy="17" r="1"></circle>
            </svg>
            <span>Report</span>
          </button>
          <button id="settingsChatButton" class="sheet-action-button" type="button">
            <svg class="top-action-icon" viewBox="0 0 24 24" aria-hidden="true">
              <rect x="6" y="7" width="12" height="10" rx="3"></rect>
              <path d="M9 7V5"></path>
              <path d="M15 7V5"></path>
              <circle cx="10" cy="12" r="1"></circle>
              <circle cx="14" cy="12" r="1"></circle>
              <path d="M10 15h4"></path>
            </svg>
            <span>AI</span>
          </button>
        </div>
        <div class="settings-info">
          <p class="settings-copy">Live risk view for the current filters.</p>
          <div class="settings-stats">
            <article class="settings-stat">
              <span>Live events</span>
              <strong id="totalEvents">--</strong>
            </article>
            <article class="settings-stat accent">
              <span>Violent</span>
              <strong id="violentEvents">--</strong>
            </article>
            <article class="settings-stat">
              <span>Calls</span>
              <strong id="callEvents">--</strong>
            </article>
            <article class="settings-stat">
              <span>Incidents</span>
              <strong id="incidentEvents">--</strong>
            </article>
          </div>
        </div>
      </section>

      <section id="reportSheet" class="overlay-sheet hidden">
        <div class="sheet-head">
          <strong>Report nearby incident</strong>
          <button id="reportCloseButton" class="ghost-button" type="button">Close</button>
        </div>
        <label class="sheet-field">
          <span>Type</span>
          <select id="reportTypeSelect">
            <option value="Armed or dangerous person">Armed or dangerous person</option>
            <option value="Aggression">Aggression</option>
            <option value="Suspicious activity">Suspicious activity</option>
            <option value="Theft or robbery">Theft or robbery</option>
            <option value="Medical emergency">Medical emergency</option>
          </select>
        </label>
        <label class="sheet-field">
          <span>Note</span>
          <textarea id="reportNoteInput" rows="4" placeholder="Short detail"></textarea>
        </label>
        <button id="reportSubmitButton" class="primary-button" type="button">Send report from my location</button>
        <p id="reportStatus" class="sheet-status">Your report stays local on this device for now.</p>
      </section>

      <section id="chatSheet" class="overlay-sheet hidden">
        <div class="sheet-head">
          <strong>AI support</strong>
          <button id="chatCloseButton" class="ghost-button" type="button">Close</button>
        </div>
        <div id="chatMessages" class="chat-messages"></div>
        <form id="chatForm" class="chat-form">
          <textarea id="askInput" rows="3" placeholder="Can I walk here right now?"></textarea>
          <button id="askButton" class="primary-button" type="submit">Ask</button>
        </form>
      </section>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <script src="/app.js?v=20260316-ui-refresh1"></script>
  </body>
</html>
